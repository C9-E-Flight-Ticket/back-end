openapi: 3.0.0
info:
  title: Notifications API
  description: API Documentation for Notifications
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/notifications
    description: Local server

paths:
  /createNotification:
    post:
      summary: Create a new notification
      tags:
        - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
                  example: 1
                title:
                  type: string
                  example: "New Notification"
                message:
                  type: string
                  example: "You have a new message."
                read:
                  type: boolean
                  example: false
      responses:
        '201':
          description: Notification created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Notification created successfully
                  data:
                    type: object
                    example:
                      id: 1
                      userId: 1
                      title: "New Notification"
                      message: "You have a new message."
                      read: false
                      createdAt: "2024-12-10T00:00:00Z"
                      updatedAt: "2024-12-10T00:00:00Z"

  /:
    get:
      summary: Get all notifications
      tags:
        - Notifications
      parameters:
        - name: userId
          in: query
          required: true
          description: ID of the user to fetch notifications for
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Notifications fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Notifications fetched successfully
                  data:
                    type: array
                    items:
                      type: object
                      example:
                        id: 1
                        userId: 1
                        title: "New Notification"
                        message: "You have a new message."
                        read: false
                        createdAt: "2024-12-10T00:00:00Z"
                        updatedAt: "2024-12-10T00:00:00Z"

  /{id}/read:
    patch:
      summary: Mark a notification as read
      tags:
        - Notifications
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the notification to mark as read
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Notification marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Notification marked as read

  /{id}:
    delete:
      summary: Delete a notification
      tags:
        - Notifications
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the notification to delete
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Notification deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Notification deleted successfully
