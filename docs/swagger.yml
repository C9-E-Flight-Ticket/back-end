openapi: 3.0.0
info:
  title: Seat API
  description: API untuk mengelola kursi pada penerbangan.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local server

paths:
  /api/seat:
    get:
      summary: Get all seats
      description: Mengambil semua data kursi.
      responses:
        '200':
          description: Berhasil mengambil data kursi.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Seat'
    post:
      summary: Create a new seat
      description: Membuat data kursi baru.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Seat'
      responses:
        '201':
          description: Kursi berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Seat'

  /api/seat/{id}:
    get:
      summary: Get a seat by ID
      description: Mengambil data kursi berdasarkan ID.
      parameters:
        - name: id
          in: path
          required: true
          description: ID kursi.
          schema:
            type: integer
      responses:
        '200':
          description: Berhasil mengambil data kursi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Seat'
    put:
      summary: Update a seat by ID
      description: Memperbarui data kursi berdasarkan ID.
      parameters:
        - name: id
          in: path
          required: true
          description: ID kursi.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Seat'
      responses:
        '200':
          description: Kursi berhasil diperbarui.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Seat'
    delete:
      summary: Delete a seat by ID
      description: Menghapus data kursi berdasarkan ID.
      parameters:
        - name: id
          in: path
          required: true
          description: ID kursi.
          schema:
            type: integer
      responses:
        '204':
          description: Kursi berhasil dihapus.

  /api/seat/detail-flight:
    get:
      summary: Get detailed flight seat information
      description: Mengambil informasi detail kursi penerbangan.
      responses:
        '200':
          description: Berhasil mengambil informasi detail kursi penerbangan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailFlightSeat'

components:
  schemas:
    Seat:
      type: object
      properties:
        flightId:
          type: integer
          example: 101
        seatNumber:
          type: string
          example: "1A"
        seatClass:
          type: string
          example: "Economy"
        price:
          type: number
          example: 100
        available:
          type: boolean
          example: true

    DetailFlightSeat:
      type: object
      properties:
        flightId:
          type: integer
          example: 101
        seatNumber:
          type: string
          example: "1A"
        seatClass:
          type: string
          example: "Economy"
        adult:
          type: integer
          example: 1
        child:
          type: integer
          example: 0
        baby:
          type: integer
          example: 0
